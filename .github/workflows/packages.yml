name: Packages

on:
  pull_request:
  workflow_dispatch:
# PR gate: build the combined daemon+dashboard package (amd64) and exercise the full
# install -> verify -> remove/purge lifecycle. Multi-arch builds + the rolling release
# run in release.yml on pushes to main.

permissions:
  contents: read

jobs:
  deb:
    name: Build and smoke-test .deb (Debian/Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools (incl. Node 22 from NodeSource for the dashboard)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git dpkg-dev fakeroot curl ca-certificates
          # Ubuntu 24.04 LTS apt ships Node 18; the bundled dashboard (Next.js 16) needs >= 20.9,
          # so use NodeSource Node 22 (what a user on an older LTS would also do). This provides
          # the apt `nodejs` that satisfies the package dependency and runs the service.
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Build the combined .deb
        run: ./scripts/package.sh

      - name: Inspect packages (daemon + dashboard)
        run: |
          set -euo pipefail
          daemon_deb=$(ls build-pkg/easy-failover_*_amd64.deb)
          dash_deb=$(ls build-pkg/easy-failover-dashboard_*_amd64.deb)
          dpkg-deb -I "$daemon_deb"; dpkg-deb -I "$dash_deb"
          dc=$(dpkg-deb -c "$daemon_deb")
          wc=$(dpkg-deb -c "$dash_deb")
          # Use here-strings (not `echo | grep -q`): grep -q closes the pipe on first match and the
          # upstream echo then fails with EPIPE, which `set -o pipefail` turns into a false error.
          for f in /usr/bin/easy-failover \
                   /usr/lib/systemd/system/easy-failover.service \
                   /etc/easy-failover/config.example.toml; do
            grep -qE "${f}\$" <<<"$dc" || { echo "::error::daemon package missing $f"; exit 1; }
          done
          # The daemon package must NOT carry any dashboard files (that is the split).
          if grep -qE 'easy-failover-dashboard' <<<"$dc"; then
            echo "::error::daemon package unexpectedly contains dashboard files"; exit 1
          fi
          if grep -qE '/etc/(init\.d|sv|dinit\.d|s6)/' <<<"$dc"; then
            echo "::error::daemon package unexpectedly contains alternative init-system files"; exit 1
          fi
          for f in /usr/lib/systemd/system/easy-failover-dashboard.service \
                   /usr/lib/easy-failover-dashboard/server.js \
                   /etc/easy-failover-dashboard/dashboard.env.example; do
            grep -qE "${f}\$" <<<"$wc" || { echo "::error::dashboard package missing $f"; exit 1; }
          done
          dpkg-deb -f "$dash_deb" Depends | grep -qE 'easy-failover( |,|\()' \
            || { echo "::error::dashboard package must depend on easy-failover"; exit 1; }

      - name: Install daemon only (resolves iproute2 / iputils-arping)
        run: |
          set -euo pipefail
          sudo apt-get install -y "./$(ls build-pkg/easy-failover_*_amd64.deb)"

      - name: Verify daemon-only install (no dashboard; write token provisioned)
        run: |
          set -euo pipefail
          test -x /usr/bin/easy-failover
          test -f /etc/easy-failover/config.toml                       # seeded by postinst
          grep -qE '^\s*enabled\s*=\s*true' /etc/easy-failover/config.toml
          easy-failover --config /etc/easy-failover/config.toml --validate-config
          # Daemon-only: the dashboard must NOT be present.
          ! getent passwd easy-failover-dashboard || { echo "::error::dashboard user present in daemon-only install"; exit 1; }
          test ! -e /usr/lib/easy-failover-dashboard || { echo "::error::dashboard files present in daemon-only install"; exit 1; }
          test ! -e /etc/easy-failover-dashboard || { echo "::error::dashboard config present in daemon-only install"; exit 1; }
          # Auto-provisioned write token.
          test -f /etc/easy-failover/api.token
          grep -qE '^\s*read_only\s*=\s*false' /etc/easy-failover/config.toml
          grep -qF 'auth_token_file = "/etc/easy-failover/api.token"' /etc/easy-failover/config.toml
          systemctl is-active --quiet easy-failover.service \
            || { echo "::error::daemon service not active"; journalctl -u easy-failover --no-pager | tail -40; exit 1; }
          # End-to-end write-token check: reject unauthenticated, accept the provisioned token.
          apiok=0
          for _ in $(seq 1 20); do
            if curl -fsS -o /dev/null http://127.0.0.1:8743/api/v1/status; then apiok=1; break; fi
            sleep 1
          done
          test "$apiok" = "1" || { echo "::error::daemon API did not come up"; journalctl -u easy-failover --no-pager | tail -40; exit 1; }
          body='{"format":"toml","config":"node_id = \"node-a\"\npriority = 100\n\n[vip]\naddress = \"\"\ninterface = \"\"\n"}'
          code="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8743/api/v1/config/apply \
            -H 'Content-Type: application/json' -d "$body")"
          { [ "$code" = "401" ] || [ "$code" = "403" ]; } \
            || { echo "::error::unauthenticated apply returned $code (want 401/403)"; exit 1; }
          token="$(sudo cat /etc/easy-failover/api.token)"
          applied="$(curl -fsS -X POST http://127.0.0.1:8743/api/v1/config/apply \
            -H "Authorization: Bearer ${token}" -H 'Content-Type: application/json' -d "$body")"
          echo "apply result: $applied"
          grep -q '"applied"[: ]*true' <<<"$applied" \
            || { echo "::error::token-authenticated apply did not report applied:true"; exit 1; }

      - name: Install dashboard (pulls in nodejs; daemon already present)
        run: |
          set -euo pipefail
          sudo apt-get install -y "./$(ls build-pkg/easy-failover-dashboard_*_amd64.deb)"

      - name: Verify dashboard install (user/env/roster wired; service serves)
        run: |
          set -euo pipefail
          test -f /usr/lib/easy-failover-dashboard/server.js
          test -f /etc/easy-failover-dashboard/dashboard.env
          getent passwd easy-failover-dashboard
          sudo test -f /var/lib/easy-failover-dashboard/nodes.json
          sudo grep -q '"tokenEnv": "EASY_FAILOVER_TOKEN_LOCAL"' /var/lib/easy-failover-dashboard/nodes.json
          # The dashboard gets the same token the daemon generated.
          sudo grep -qE '^EASY_FAILOVER_TOKEN_LOCAL=' /etc/easy-failover-dashboard/dashboard.env
          perms="$(stat -c '%a' /etc/easy-failover-dashboard/dashboard.env)"
          test "$perms" = "640" || { echo "::error::dashboard.env perms $perms (want 640)"; exit 1; }
          systemctl is-active --quiet easy-failover-dashboard.service \
            || { echo "::error::dashboard service not active"; journalctl -u easy-failover-dashboard --no-pager | tail -40; exit 1; }
          ok=0
          for _ in $(seq 1 20); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/; then ok=1; break; fi
            sleep 1
          done
          test "$ok" = "1" || { echo "::error::dashboard did not serve a request"; exit 1; }

      - name: Purge dashboard keeps the daemon; purge daemon removes everything
        run: |
          set -euo pipefail
          sudo apt-get purge -y easy-failover-dashboard
          test -x /usr/bin/easy-failover || { echo "::error::purging dashboard should not remove the daemon"; exit 1; }
          test ! -e /etc/easy-failover-dashboard || { echo "::error::purge should remove dashboard config"; exit 1; }
          test ! -e /var/lib/easy-failover-dashboard || { echo "::error::purge should remove dashboard state"; exit 1; }
          ! getent passwd easy-failover-dashboard || { echo "::error::purge should remove the dashboard user"; exit 1; }
          sudo apt-get remove -y easy-failover
          test ! -e /usr/bin/easy-failover
          test -f /etc/easy-failover/config.toml || { echo "::error::remove should keep config"; exit 1; }
          sudo apt-get purge -y easy-failover
          test ! -e /etc/easy-failover || { echo "::error::purge should remove /etc/easy-failover"; exit 1; }

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: easy-failover-deb
          path: build-pkg/easy-failover*_amd64.deb
          if-no-files-found: error

  rpm:
    name: Build and smoke-test .rpm (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools
        run: dnf install -y cmake gcc-c++ make rpm-build git nodejs npm

      - name: Build the .rpm packages
        run: ./scripts/package.sh

      - name: Identify + inspect packages (daemon + dashboard)
        run: |
          set -e
          daemon_rpm=
          dash_rpm=
          for f in build-pkg/easy-failover-*.rpm; do
            n=$(rpm -qp --queryformat '%{NAME}' "$f")
            if [ "$n" = easy-failover ]; then daemon_rpm=$f; fi
            if [ "$n" = easy-failover-dashboard ]; then dash_rpm=$f; fi
          done
          if [ -z "$daemon_rpm" ] || [ -z "$dash_rpm" ]; then
            echo "::error::expected two rpms (daemon=$daemon_rpm dashboard=$dash_rpm)"; exit 1
          fi
          echo "DAEMON_RPM=$daemon_rpm" >> "$GITHUB_ENV"
          echo "DASH_RPM=$dash_rpm" >> "$GITHUB_ENV"
          # The daemon rpm must not carry dashboard files.
          if rpm -qpl "$daemon_rpm" | grep -qE 'easy-failover-dashboard'; then
            echo "::error::daemon rpm contains dashboard files"; exit 1
          fi
          if ! rpm -qpl "$dash_rpm" | grep -qE '/usr/lib/easy-failover-dashboard/server\.js$'; then
            echo "::error::dashboard rpm missing server.js"; exit 1
          fi
          if ! rpm -qp --requires "$dash_rpm" | grep -qE '^easy-failover([[:space:]]|$)'; then
            echo "::error::dashboard rpm must require easy-failover"; exit 1
          fi

      - name: Install daemon only
        run: dnf install -y "./$DAEMON_RPM"

      - name: Verify daemon-only install (no dashboard; token provisioned)
        run: |
          set -euo pipefail
          test -x /usr/bin/easy-failover
          test -f /etc/easy-failover/config.toml
          easy-failover --config /etc/easy-failover/config.toml --validate-config
          ! getent passwd easy-failover-dashboard || { echo "::error::dashboard user present in daemon-only install"; exit 1; }
          test ! -e /usr/lib/easy-failover-dashboard || { echo "::error::dashboard files present in daemon-only install"; exit 1; }
          test -f /etc/easy-failover/api.token
          grep -qE '^\s*read_only\s*=\s*false' /etc/easy-failover/config.toml
          grep -qF 'auth_token_file = "/etc/easy-failover/api.token"' /etc/easy-failover/config.toml

      - name: Install dashboard (requires the daemon, already present)
        run: dnf install -y "./$DASH_RPM"

      - name: Verify dashboard install (wiring + standalone server serves)
        run: |
          set -euo pipefail
          test -f /usr/lib/easy-failover-dashboard/server.js
          getent passwd easy-failover-dashboard
          test -f /var/lib/easy-failover-dashboard/nodes.json
          grep -q '"tokenEnv": "EASY_FAILOVER_TOKEN_LOCAL"' /var/lib/easy-failover-dashboard/nodes.json
          grep -qE '^EASY_FAILOVER_TOKEN_LOCAL=' /etc/easy-failover-dashboard/dashboard.env
          perms="$(stat -c '%a' /etc/easy-failover-dashboard/dashboard.env)"
          test "$perms" = "640" || { echo "::error::dashboard.env perms $perms (want 640)"; exit 1; }
          # systemd isn't running in the container, so smoke-test the standalone server directly.
          node_bin=$(command -v node || command -v nodejs)
          runuser -u easy-failover-dashboard -- env PORT=3000 HOSTNAME=127.0.0.1 \
            "$node_bin" /usr/lib/easy-failover-dashboard/server.js &
          ok=0
          for _ in $(seq 1 20); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/; then ok=1; break; fi
            sleep 1
          done
          test "$ok" = "1" || { echo "::error::dashboard did not serve a request"; exit 1; }

      - name: Erase dashboard keeps daemon; erase daemon removes config
        run: |
          set -euo pipefail
          dnf remove -y easy-failover-dashboard
          test -x /usr/bin/easy-failover || { echo "::error::erasing dashboard should not remove the daemon"; exit 1; }
          test ! -e /etc/easy-failover-dashboard || { echo "::error::erase should remove dashboard config"; exit 1; }
          test ! -e /var/lib/easy-failover-dashboard || { echo "::error::erase should remove dashboard state"; exit 1; }
          dnf remove -y easy-failover
          test ! -e /usr/bin/easy-failover
          test ! -e /etc/easy-failover || { echo "::error::erase should remove /etc/easy-failover"; exit 1; }

      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v6
        with:
          name: easy-failover-rpm
          path: build-pkg/easy-failover-*.rpm
          if-no-files-found: error

  cockpit:
    name: Build and smoke-test the Cockpit plugin package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate plugin assets
        run: |
          set -euo pipefail
          node --check cockpit/app.js
          node -e "JSON.parse(require('fs').readFileSync('cockpit/manifest.json','utf8'))"

      - name: Build the Cockpit packages
        env:
          PKG_VERSION: "0.0.0"   # hyphen-free: rpm Version forbids '-'
        run: ./scripts/package-cockpit.sh

      - name: Inspect + install (static assets land under /usr/share/cockpit)
        run: |
          set -euo pipefail
          deb=$(ls build-cockpit/easy-failover-cockpit_*_all.deb)
          c="$(dpkg-deb -f "$deb")"
          grep -qE '^Architecture: all$'              <<<"$c" || { echo "::error::not arch:all"; exit 1; }
          deps="$(dpkg-deb -f "$deb" Depends)"
          grep -qE '(^|[, ])easy-failover([, ]|\(|$)'  <<<"$deps" || { echo "::error::missing easy-failover dep"; exit 1; }
          grep -qE '(^|[, ])cockpit([, ]|\(|$)'        <<<"$deps" || { echo "::error::missing cockpit dep"; exit 1; }
          grep -qE '(^|[, ])cockpit-bridge([, ]|\(|$)' <<<"$deps" || { echo "::error::missing cockpit-bridge dep"; exit 1; }
          for f in manifest.json index.html app.js easy-failover.css; do
            dpkg-deb -c "$deb" | grep -qE "usr/share/cockpit/easy-failover/${f}\$" \
              || { echo "::error::package missing $f"; exit 1; }
          done
          # Deps (easy-failover, cockpit-bridge) aren't in apt here, so lay the files down
          # directly to confirm the payload installs cleanly.
          sudo dpkg -i --force-depends "$deb"
          test -f /usr/share/cockpit/easy-failover/manifest.json
          test -f /usr/share/cockpit/easy-failover/app.js
          sudo dpkg -r --force-depends easy-failover-cockpit
          test ! -e /usr/share/cockpit/easy-failover/manifest.json

      - name: Upload Cockpit .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: easy-failover-cockpit-deb
          path: build-cockpit/easy-failover-cockpit_*_all.deb
          if-no-files-found: error
