name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CMAKE_VERSION: 4.3.2
  BUILD_TYPE: Release

jobs:
  linux-smoke:
    name: Linux smoke build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install CMake
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" \
            -o "$RUNNER_TEMP/cmake.tar.gz"
          tar -xzf "$RUNNER_TEMP/cmake.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          cmake --version
          c++ --version

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE="${BUILD_TYPE}"

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --no-tests=error

      - name: Smoke test version
        run: ./build/easy-failover --version

      - name: Smoke test config validation
        run: ./build/easy-failover --config configs/easy-failover.toml --validate-config

      - name: Smoke test dry run
        run: ./build/easy-failover --config configs/easy-failover.toml --dry-run

      - name: Smoke test staged install
        run: |
          set -euo pipefail
          cmake --install build --prefix "$RUNNER_TEMP/easy-failover-install"
          test -x "$RUNNER_TEMP/easy-failover-install/bin/easy-failover"
          test -f "$RUNNER_TEMP/easy-failover-install/etc/easy-failover/config.example.toml"
          test -f "$RUNNER_TEMP/easy-failover-install/lib/systemd/system/easy-failover.service"
          test -f "$RUNNER_TEMP/easy-failover-install/share/doc/easy-failover/README.md"
          test -f "$RUNNER_TEMP/easy-failover-install/share/doc/easy-failover/docs/install-package-layout.md"
