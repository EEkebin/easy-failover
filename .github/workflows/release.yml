name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Version --------------------------------------------------------------------------------
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      rolling: ${{ steps.v.outputs.rolling }}
      shortsha: ${{ steps.v.outputs.shortsha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: v
        run: |
          set -euo pipefail
          version="$(./scripts/version.sh "${GITHUB_REF}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "shortsha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          case "${GITHUB_REF}" in
            refs/tags/*) echo "rolling=false" >> "$GITHUB_OUTPUT" ;;
            *)           echo "rolling=true"  >> "$GITHUB_OUTPUT" ;;
          esac

  # ---- Combined daemon+dashboard .deb (native amd64 / arm64) ---------------------------------
  deb:
    name: .deb (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git dpkg-dev fakeroot
      - name: Build the combined .deb
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package.sh
      - name: Build daemon-only tarball
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          name="easy-failover-linux-${arch}"
          DESTDIR="$PWD/dist/${name}" cmake --install build-pkg --prefix /usr --component daemon
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - uses: actions/upload-artifact@v6
        with:
          name: deb-${{ matrix.arch }}
          path: |
            build-pkg/easy-failover_*.deb
            dist/easy-failover-linux-*.tar.gz
            dist/easy-failover-linux-*.tar.gz.sha256
          if-no-files-found: error

  # ---- Combined daemon+dashboard .rpm (native amd64 / arm64, Fedora container) ---------------
  rpm:
    name: .rpm (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v6
      - run: dnf install -y cmake gcc-c++ make rpm-build git nodejs npm
      - name: Build the combined .rpm
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package.sh
      - uses: actions/upload-artifact@v6
        with:
          name: rpm-${{ matrix.arch }}
          path: build-pkg/easy-failover-*.rpm
          if-no-files-found: error

  # riscv64 is disabled for now (the emulated build is slow). The daemon does cross-compile to
  # riscv64 via QEMU if re-added later; the dashboard's Next.js toolchain has no riscv64 build.

  # ---- Publish --------------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [version, deb, rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Collect packages
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) \
            -exec cp -v {} dist/ \;
          echo "Collected:"; ls -1 dist

      - name: Publish rolling 'latest' pre-release (main)
        if: needs.version.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          SHORTSHA: ${{ needs.version.outputs.shortsha }}
        run: |
          set -euo pipefail
          title="Rolling build ${VERSION} (${SHORTSHA})"
          notes="Automated rolling build of \`main\` at ${SHORTSHA} (version ${VERSION}). One combined daemon+dashboard package (.deb/.rpm) for amd64 and arm64, plus daemon-only source tarballs."
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin "refs/tags/latest"
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit latest --repo "${GITHUB_REPOSITORY}" \
              --prerelease --title "${title}" --notes "${notes}"
            for a in $(gh release view latest --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name'); do
              gh release delete-asset latest "${a}" --repo "${GITHUB_REPOSITORY}" --yes || true
            done
          else
            gh release create latest --repo "${GITHUB_REPOSITORY}" \
              --prerelease --title "${title}" --notes "${notes}" --verify-tag
          fi
          gh release upload latest dist/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish tagged release
        if: needs.version.outputs.rolling == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "easy-failover ${VERSION}: combined daemon+dashboard packages (.deb/.rpm) and daemon source tarballs for amd64 and arm64."
