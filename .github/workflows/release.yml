name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CMAKE_VERSION: 4.3.2
  BUILD_TYPE: Release

jobs:
  linux-tarball-deb:
    name: Build Linux tarball and .deb
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev fakeroot
          curl -L --fail --retry 3 \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" \
            -o "$RUNNER_TEMP/cmake.tar.gz"
          tar -xzf "$RUNNER_TEMP/cmake.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DCMAKE_INSTALL_SYSCONFDIR=/etc

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Smoke test release binary
        run: |
          ./build/easy-failover --version
          ./build/easy-failover --config configs/easy-failover.toml --validate-config
          ./build/easy-failover --config configs/easy-failover.toml --dry-run

      - name: Package tarball
        run: |
          set -euo pipefail
          DESTDIR="$PWD/dist/easy-failover-linux-x86_64" cmake --install build --prefix /usr
          tar -C dist -czf "dist/easy-failover-linux-x86_64.tar.gz" easy-failover-linux-x86_64
          (
            cd dist
            sha256sum "easy-failover-linux-x86_64.tar.gz" > \
              "easy-failover-linux-x86_64.tar.gz.sha256"
          )

      - name: Build .deb
        run: |
          set -euo pipefail
          ./scripts/package.sh
          cp build-pkg/easy-failover_*_amd64.deb dist/

      - name: Upload tarball + .deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-tarball-deb
          path: |
            dist/easy-failover-linux-x86_64.tar.gz
            dist/easy-failover-linux-x86_64.tar.gz.sha256
            dist/easy-failover_*_amd64.deb
          if-no-files-found: error

  rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build tools
        run: dnf install -y cmake gcc-c++ make rpm-build git

      - name: Build .rpm
        run: ./scripts/package.sh

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpm
          path: build-pkg/easy-failover-*.rpm
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [linux-tarball-deb, rpm]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/linux-tarball-deb/easy-failover-linux-x86_64.tar.gz \
            artifacts/linux-tarball-deb/easy-failover-linux-x86_64.tar.gz.sha256 \
            artifacts/linux-tarball-deb/easy-failover_*_amd64.deb \
            artifacts/rpm/easy-failover-*.rpm \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated easy-failover Linux x86_64 release: source tarball (+sha256), .deb, and .rpm."
