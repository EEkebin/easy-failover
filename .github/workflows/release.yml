name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Serialize per ref; a newer push to main supersedes an in-flight rolling build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Version --------------------------------------------------------------------------------
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      rolling: ${{ steps.v.outputs.rolling }}
      shortsha: ${{ steps.v.outputs.shortsha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for `git rev-list --count`
      - id: v
        run: |
          set -euo pipefail
          version="$(./scripts/version.sh "${GITHUB_REF}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "shortsha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          case "${GITHUB_REF}" in
            refs/tags/*) echo "rolling=false" >> "$GITHUB_OUTPUT" ;;
            *)           echo "rolling=true"  >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Version: ${version}"

  # ---- Daemon .deb (native amd64 / arm64) ----------------------------------------------------
  daemon-deb:
    name: Daemon .deb (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git dpkg-dev fakeroot
      - name: Build .deb
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package.sh
      - name: Build tarball
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          name="easy-failover-linux-${arch}"
          DESTDIR="$PWD/dist/${name}" cmake --install build-pkg --prefix /usr
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - uses: actions/upload-artifact@v6
        with:
          name: daemon-deb-${{ matrix.arch }}
          path: |
            build-pkg/easy-failover_*.deb
            dist/easy-failover-linux-*.tar.gz
            dist/easy-failover-linux-*.tar.gz.sha256
          if-no-files-found: error

  # ---- Daemon .rpm (native amd64 / arm64, Fedora container) ----------------------------------
  daemon-rpm:
    name: Daemon .rpm (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v6
      - run: dnf install -y cmake gcc-c++ make rpm-build git
      - name: Build .rpm
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package.sh
      - uses: actions/upload-artifact@v6
        with:
          name: daemon-rpm-${{ matrix.arch }}
          path: build-pkg/easy-failover-*.rpm
          if-no-files-found: error

  # ---- Dashboard .deb (native amd64 / arm64) -------------------------------------------------
  dashboard-deb:
    name: Dashboard .deb (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake git dpkg-dev fakeroot
      - name: Build dashboard .deb
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package-dashboard.sh
      - uses: actions/upload-artifact@v6
        with:
          name: dashboard-deb-${{ matrix.arch }}
          path: build-dashboard-pkg/easy-failover-dashboard_*.deb
          if-no-files-found: error

  # ---- Dashboard .rpm (native amd64 / arm64, Fedora container) --------------------------------
  dashboard-rpm:
    name: Dashboard .rpm (${{ matrix.arch }})
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:latest
    steps:
      - uses: actions/checkout@v6
      - run: dnf install -y cmake rpm-build nodejs npm git
      - name: Build dashboard .rpm
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/package-dashboard.sh
      - uses: actions/upload-artifact@v6
        with:
          name: dashboard-rpm-${{ matrix.arch }}
          path: build-dashboard-pkg/easy-failover-dashboard-*.rpm
          if-no-files-found: error

  # ---- riscv64 (emulated via QEMU; EXPERIMENTAL, non-blocking) -------------------------------
  daemon-deb-riscv64:
    name: Daemon .deb (riscv64, emulated)
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - name: Build riscv64 .deb in an emulated Debian container
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: |
          docker run --rm --platform linux/riscv64 \
            -e PKG_VERSION="${PKG_VERSION}" \
            -v "$PWD":/src -w /src debian:trixie bash -c '
              set -e
              apt-get update
              apt-get install -y build-essential cmake git dpkg-dev fakeroot ca-certificates
              ./scripts/package.sh
            '
      - uses: actions/upload-artifact@v6
        with:
          name: daemon-deb-riscv64
          path: build-pkg/easy-failover_*.deb
          if-no-files-found: warn

  dashboard-deb-riscv64:
    name: Dashboard .deb (riscv64, emulated, experimental)
    needs: version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - name: Build riscv64 dashboard .deb (webpack bundler; Turbopack has no riscv64 bindings)
        env:
          PKG_VERSION: ${{ needs.version.outputs.version }}
        run: |
          docker run --rm --platform linux/riscv64 \
            -e PKG_VERSION="${PKG_VERSION}" \
            -e DASHBOARD_BUILD_FLAGS="--webpack" \
            -v "$PWD":/src -w /src debian:trixie bash -c '
              set -e
              apt-get update
              apt-get install -y cmake git dpkg-dev fakeroot ca-certificates nodejs npm
              ./scripts/package-dashboard.sh
            '
      - uses: actions/upload-artifact@v6
        with:
          name: dashboard-deb-riscv64
          path: build-dashboard-pkg/easy-failover-dashboard_*.deb
          if-no-files-found: warn

  # ---- Publish --------------------------------------------------------------------------------
  publish:
    name: Publish release
    needs:
      - version
      - daemon-deb
      - daemon-rpm
      - dashboard-deb
      - dashboard-rpm
      - daemon-deb-riscv64
      - dashboard-deb-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Collect packages
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) \
            -exec cp -v {} dist/ \;
          echo "Collected:"; ls -1 dist

      - name: Publish rolling 'latest' pre-release (main)
        if: needs.version.outputs.rolling == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          SHORTSHA: ${{ needs.version.outputs.shortsha }}
        run: |
          set -euo pipefail
          title="Rolling build ${VERSION} (${SHORTSHA})"
          notes="Automated rolling build of \`main\` at ${SHORTSHA} (version ${VERSION}). Daemon and dashboard packages for amd64 and arm64; riscv64 is experimental and may be absent."
          # Re-point the rolling 'latest' tag at this commit WITHOUT deleting the release, so
          # 'latest' is never missing even if a run is interrupted mid-publish.
          git tag -f latest "${GITHUB_SHA}"
          git push -f origin "refs/tags/latest"
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit latest --repo "${GITHUB_REPOSITORY}" \
              --prerelease --title "${title}" --notes "${notes}"
            # Asset filenames are version-stamped, so drop stale assets before re-uploading.
            for a in $(gh release view latest --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name'); do
              gh release delete-asset latest "${a}" --repo "${GITHUB_REPOSITORY}" --yes || true
            done
          else
            gh release create latest --repo "${GITHUB_REPOSITORY}" \
              --prerelease --title "${title}" --notes "${notes}" --verify-tag
          fi
          gh release upload latest dist/* --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish tagged release
        if: needs.version.outputs.rolling == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "easy-failover ${VERSION}: daemon and dashboard packages (.deb/.rpm) and source tarballs for amd64 and arm64; riscv64 .deb where available."
