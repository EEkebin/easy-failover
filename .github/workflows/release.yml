name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CMAKE_VERSION: 4.3.2
  BUILD_TYPE: Release

jobs:
  linux-release:
    name: Build Linux release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install CMake
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" \
            -o "$RUNNER_TEMP/cmake.tar.gz"
          tar -xzf "$RUNNER_TEMP/cmake.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/cmake-${CMAKE_VERSION}-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE="${BUILD_TYPE}"

      - name: Build
        run: cmake --build build --config "${BUILD_TYPE}" --parallel

      - name: Smoke test release binary
        run: |
          ./build/easy-failover --version
          ./build/easy-failover --config configs/easy-failover.toml --validate-config
          ./build/easy-failover --config configs/easy-failover.toml --dry-run

      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p "dist/easy-failover-linux-x86_64"
          cp build/easy-failover "dist/easy-failover-linux-x86_64/"
          cp README.md LICENSE "dist/easy-failover-linux-x86_64/"
          cp configs/easy-failover.toml "dist/easy-failover-linux-x86_64/"
          cp packaging/systemd/easy-failover.service "dist/easy-failover-linux-x86_64/"
          tar -C dist -czf "dist/easy-failover-linux-x86_64.tar.gz" easy-failover-linux-x86_64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: easy-failover-linux-x86_64
          path: dist/easy-failover-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/easy-failover-linux-x86_64.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated easyFailover Linux x86_64 release build."
