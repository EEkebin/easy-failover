node_id = "node-a"
priority = 100

[vip]
address = "10.0.0.50/24"
interface = "eth0"

[heartbeat]
bind = "0.0.0.0:7432"
interval_ms = 1000
timeout_ms = 3000

[health]
command = "curl -fsS http://127.0.0.1:8080/health"
interval_ms = 1000
timeout_ms = 2000

[election]
# Enable quorum to require a majority of the cluster to be visible before owning the VIP.
# A node that loses quorum releases the VIP (self-fencing). Off by default.
require_quorum = false
# When false, defer to an existing healthy master instead of preempting it.
preempt = true
# Quorum threshold override: 0 = automatic strict majority (floor(N/2)+1, N = peers + 1).
# For a 2-node cluster, majority is 2 (a lone survivor cannot own); add a witness node, or set
# quorum_size = 1 to let a lone node own (accepts split-brain risk on a partition).
quorum_size = 0

[api]
# Read-only status API on localhost, on by default so the bundled dashboard works
# out of the box. It exposes no privileged actions. To reach it from a remote
# dashboard, change bind to a routable address and front it with a proxy/SSH tunnel.
enabled = true
bind = "127.0.0.1:8743"
read_only = true

[mutation_safety]
# Real VIP movement stays OFF by default. Enable only after validating the node
# config, capabilities, and failover behavior in your environment.
allow_network_mutation = false

[[peers]]
id = "node-b"
address = "10.0.0.12:7432"

[[peers]]
id = "node-c"
address = "10.0.0.13:7432"
