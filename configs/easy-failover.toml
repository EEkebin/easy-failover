# easy-failover configuration.
#
# This is a clean slate: no VIP and no peers are set. The daemon starts and idles
# until you configure it — set the VIP and add peer nodes via the dashboard's
# onboarding, or edit this file directly and restart `easy-failover`.

node_id = "node-a"
priority = 100

[vip]
# The virtual IP this node may own, and the interface to put it on. Leave empty to
# stay unconfigured/idle. Example: address = "10.0.0.50/24", interface = "eth0".
address = ""
interface = ""

[heartbeat]
bind = "0.0.0.0:7432"
interval_ms = 1000
timeout_ms = 3000

[health]
# Optional health check; empty means "always healthy" (no check).
command = ""
interval_ms = 1000
timeout_ms = 2000

[election]
# Require a majority of the cluster to be visible before owning the VIP; a node that
# loses quorum releases it (self-fencing). Off by default.
require_quorum = false
# When false, defer to an existing healthy master instead of preempting it.
preempt = true
# Quorum threshold override: 0 = automatic strict majority (floor(N/2)+1, N = peers + 1).
quorum_size = 0

[api]
# Status/config API, bound to all interfaces so the dashboard (and remote read-only
# dashboards) can reach it. NOTE: 0.0.0.0 means it is reachable from any address that can
# route to this host; restrict with a firewall if that is not what you want.
#
# This ships read-only. The .deb/.rpm AUTO-PROVISION write mode on first install: they
# generate a random token in auth_token_file and flip read_only to false, so the bundled
# (localhost-bound) dashboard can apply config out of the box. Building/running from source
# stays read-only until you set a token yourself — see docs/config-reference.md.
enabled = true
bind = "0.0.0.0:8743"
read_only = true
# Bearer-token file that authenticates write requests. Required when read_only = false
# (the API fails closed otherwise). Empty = no token (read-only).
auth_token_file = ""

[mutation_safety]
# Real VIP movement is ON by default. The daemon will perform actual `ip addr`/`arping`
# changes once a VIP is configured. (It still does nothing while unconfigured.)
allow_network_mutation = true

# Peers are added via the dashboard (or here as [[peers]] entries). None by default.

# Zero-config LAN auto-clustering (off by default). When enabled, nodes broadcast a
# signed beacon and discover each other automatically — no static [[peers]] needed.
# Every node in the pool needs the SAME cluster name and secret file. Generate the
# secret once with `openssl rand -hex 32` and copy it to each node.
# [discovery]
# enabled = true
# cluster = "default"
# bind = "0.0.0.0:7433"
# interval_ms = 1000
# timeout_ms = 3000
# secret_file = "/etc/easy-failover/cluster.key"
