# easy-failover configuration.
#
# This is a clean slate: no VIP and no peers are set. The daemon starts and idles
# until you configure it — set the VIP and add peer nodes via the dashboard's
# onboarding, or edit this file directly and restart `easy-failover`.

node_id = "node-a"
priority = 100

[vip]
# The virtual IP this node may own, and the interface to put it on. Leave empty to
# stay unconfigured/idle. Example: address = "10.0.0.50/24", interface = "eth0".
address = ""
interface = ""

[heartbeat]
bind = "0.0.0.0:7432"
interval_ms = 1000
timeout_ms = 3000

[health]
# Optional health check; empty means "always healthy" (no check).
command = ""
interval_ms = 1000
timeout_ms = 2000

[election]
# Require a majority of the cluster to be visible before owning the VIP; a node that
# loses quorum releases it (self-fencing). Off by default.
require_quorum = false
# When false, defer to an existing healthy master instead of preempting it.
preempt = true
# Quorum threshold override: 0 = automatic strict majority (floor(N/2)+1, N = peers + 1).
quorum_size = 0

[api]
# Read-only status API, bound to all interfaces so the dashboard (and remote dashboards)
# can reach it. It exposes no privileged actions while read_only is true. NOTE: 0.0.0.0
# means the status/config API is reachable from any address that can route to this host;
# restrict with a firewall if that is not what you want.
enabled = true
bind = "0.0.0.0:8743"
read_only = true

[mutation_safety]
# Real VIP movement is ON by default. The daemon will perform actual `ip addr`/`arping`
# changes once a VIP is configured. (It still does nothing while unconfigured.)
allow_network_mutation = true

# Peers are added via the dashboard (or here as [[peers]] entries). None by default.
